spring.application.name=PRODUCT-SERVICE

server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3306/product_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# =====================================================================
# 2. CORE JPA & HIBERNATE SETTINGS
# =====================================================================
# Specifies the database platform to help Hibernate generate optimized SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Controls automated database schema updates
spring.jpa.hibernate.ddl-auto=update

# =====================================================================
# 3. DEBUGGING & LOGGING SETTINGS
# =====================================================================
# Prints executed SQL queries directly to the console log
spring.jpa.show-sql=true

# Formats the logged SQL string so it is human-readable
spring.jpa.properties.hibernate.format_sql=true

# Displays the actual values bound inside SQL parameter placeholders (?)
logging.level.org.hibernate.orm.results.basic=TRACE